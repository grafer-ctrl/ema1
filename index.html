<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Terminal - Dashboard Indikator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #050510;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .terminal-container {
            width: 100%;
            max-width: 800px;
            background-color: #000000;
            border: 3px solid #333333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.7);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: bold;
            color: #8888aa;
        }
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: #2e7d32;
            color: #fff;
        }
        .status-badge.warning {
            background-color: #b71c1c;
        }
        .status-badge.simulated {
            background-color: #e65100;
        }
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 520px;
            background-color: #080826;
            border: 1px solid #222244;
            margin-bottom: 20px;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #000000;
            padding: 10px 0;
        }
        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-start;
        }
        .btn {
            background-color: #000000;
            border: 2px solid #ffffff;
            border-radius: 12px;
            color: #ffffff;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            min-width: 80px;
            text-align: center;
        }
        .btn:hover {
            background-color: #222222;
        }
        .btn.active {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        .btn-refresh {
            border-color: #ff9100;
            color: #ff9100;
            margin-left: auto;
        }
        .btn-refresh:hover {
            background-color: #3e2723;
        }
        .btn-refresh:active {
            background-color: #ff9100;
            color: #000000;
        }
        @media (max-width: 600px) {
            .btn-refresh {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="chart-header">
            <span id="chart-title">GBP/USD - H1</span>
            <span id="api-status" class="status-badge">Menghubungkan API...</span>
        </div>
        
        <div class="chart-wrapper">
            <canvas id="chartCanvas"></canvas>
        </div>

        <div class="controls-container">
            <!-- Hanya H1 & H4 untuk memastikan kestabilan data valid -->
            <div class="control-row">
                <button class="btn active" onclick="changeTimeframe('1h', this)">H1</button>
                <button class="btn" onclick="changeTimeframe('4h', this)">H4</button>
                <button class="btn btn-refresh" onclick="refreshData()">REFRES API</button>
            </div>
            <div class="control-row">
                <button class="btn active" onclick="changeSymbol('GBP/USD', this)">GBP/USD</button>
                <button class="btn" onclick="changeSymbol('EUR/USD', this)">EUR/USD</button>
                <button class="btn" onclick="changeSymbol('XAU/USD', this)">XAU/USD</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "8cd5e84fa4564322b907aaddac29b059";
        let currentSymbol = "GBP/USD";
        let currentInterval = "1h"; // Default H1
        let rawData = [];
        let calculatedData = {};
        let isUsingMock = false;

        const canvas = document.getElementById("chartCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            drawChart();
        }

        window.addEventListener("resize", resizeCanvas);

        // Ambil Data Pasar Riil dari Twelve Data
        async function fetchData() {
            document.getElementById("api-status").innerText = "Mengunduh...";
            document.getElementById("api-status").className = "status-badge warning";
            
            // PERBAIKAN UTAMA: Mengirimkan simbol apa adanya menggunakan encodeURIComponent agar tanda "/" tetap utuh
            const encodedSymbol = encodeURIComponent(currentSymbol);
            const url = `https://api.twelvedata.com/time_series?symbol=${encodedSymbol}&interval=${currentInterval}&apikey=${API_KEY}&outputsize=100`;

            try {
                const response = await fetch(url);
                const result = await response.json();

                if (result.status === "ok" && result.values && result.values.length > 0) {
                    rawData = result.values.reverse();
                    isUsingMock = false;
                    document.getElementById("api-status").innerText = "LIVE DATA (VALID)";
                    document.getElementById("api-status").className = "status-badge";
                } else {
                    // Jika terjadi kegagalan/limit harian terlewati, infokan status simulasi
                    console.warn("API ditolak. Mengaktifkan visualisasi simulasi.");
                    useMockData();
                }
            } catch (error) {
                console.error("Terjadi galat:", error);
                useMockData();
            }

            processTechnicalIndicators();
            drawChart();
        }

        // Generator simulasi cadangan jika koneksi gagal atau limit Twelve Data habis
        function useMockData() {
            isUsingMock = true;
            document.getElementById("api-status").innerText = "DATA SIMULASI (LIMIT/OFFLINE)";
            document.getElementById("api-status").className = "status-badge simulated";
            
            let basePrice = currentSymbol === "XAU/USD" ? 2300 : (currentSymbol === "GBP/USD" ? 1.27 : 1.09);
            const mockList = [];
            let currentTime = Date.now();
            
            let step = currentInterval === "1h" ? 60 * 60 * 1000 : 4 * 60 * 60 * 1000;

            for (let i = 0; i < 100; i++) {
                let change = (Math.random() - 0.49) * (basePrice * 0.0035);
                let open = basePrice;
                let close = basePrice + change;
                let high = Math.max(open, close) + (Math.random() * basePrice * 0.001);
                let low = Math.min(open, close) - (Math.random() * basePrice * 0.001);
                
                mockList.push({
                    datetime: new Date(currentTime - (100 - i) * step).toISOString(),
                    open: open.toString(),
                    high: high.toString(),
                    low: low.toString(),
                    close: close.toString()
                });
                basePrice = close;
            }
            rawData = mockList;
        }

        // Penghitungan EMA
        function calculateEMA(prices, period) {
            const ema = [];
            const k = 2 / (period + 1);
            let sum = 0;

            const firstValidIdx = period - 1;
            for (let i = 0; i < Math.min(period, prices.length); i++) {
                sum += prices[i];
            }
            let prevEMA = sum / Math.min(period, prices.length);

            for (let i = 0; i < prices.length; i++) {
                if (i < firstValidIdx) {
                    ema.push(null);
                } else if (i === firstValidIdx) {
                    ema.push(prevEMA);
                } else {
                    let currentEMA = prices[i] * k + prevEMA * (1 - k);
                    ema.push(currentEMA);
                    prevEMA = currentEMA;
                }
            }
            return ema;
        }

        // Proses Seluruh Indikator
        function processTechnicalIndicators() {
            const length = rawData.length;
            if (length === 0) return;

            const highs = rawData.map(d => parseFloat(d.high));
            const lows = rawData.map(d => parseFloat(d.low));
            const closes = rawData.map(d => parseFloat(d.close));

            // Indikator Symmetrical MA Ribbon
            const fastMA = calculateEMA(closes, 10);
            const slowMA = calculateEMA(closes, 30);
            const mirrorMA = [];

            for (let i = 0; i < length; i++) {
                if (fastMA[i] !== null && slowMA[i] !== null) {
                    mirrorMA[i] = (2.0 * slowMA[i]) - fastMA[i];
                } else {
                    mirrorMA[i] = null;
                }
            }

            // Indikator EMA Subwindow 2-50
            const stochRaw = [];
            const stochPeriod = 14;

            for (let i = 0; i < length; i++) {
                if (i < stochPeriod - 1) {
                    stochRaw.push(50.0);
                } else {
                    const subsetHigh = highs.slice(i - stochPeriod + 1, i + 1);
                    const subsetLow = lows.slice(i - stochPeriod + 1, i + 1);
                    const highestHigh = Math.max(...subsetHigh);
                    const lowestLow = Math.min(...subsetLow);
                    const range = highestHigh - lowestLow;

                    if (range > 0) {
                        stochRaw.push(((closes[i] - lowestLow) / range) * 100.0);
                    } else {
                        stochRaw.push(50.0);
                    }
                }
            }

            const emaSub1 = calculateEMA(stochRaw, 2);
            const emaSub2 = calculateEMA(stochRaw, 50);

            calculatedData = {
                fastMA,
                slowMA,
                mirrorMA,
                emaSub1,
                emaSub2
            };
        }

        function parseBarDate(dateStr) {
            return new Date(dateStr.replace(' ', 'T'));
        }

        // Visualisasi Canvas utama
        function drawChart() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            ctx.fillStyle = "#080826";
            ctx.fillRect(0, 0, width, height);

            if (rawData.length === 0) {
                ctx.fillStyle = "#ffffff";
                ctx.font = "14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("Menghubungkan data...", width / 2, height / 2);
                return;
            }

            const rightMargin = 60;
            const chartWidth = width - rightMargin;

            const mainTopY = 20;
            const mainBottomY = height * 0.60;
            const mainHeight = mainBottomY - mainTopY;

            const subTopY = height * 0.65;
            const subBottomY = height - 15;
            const subHeight = subBottomY - subTopY;

            const visibleBarsCount = 65;
            const startIndex = Math.max(0, rawData.length - visibleBarsCount);
            const endIndex = rawData.length - 1;
            const currentVisibleCount = endIndex - startIndex + 1;

            const barSpacing = chartWidth / currentVisibleCount;

            let maxVal = -Infinity;
            let minVal = Infinity;

            for (let i = startIndex; i <= endIndex; i++) {
                const high = parseFloat(rawData[i].high);
                const low = parseFloat(rawData[i].low);
                maxVal = Math.max(maxVal, high);
                minVal = Math.min(minVal, low);

                if (calculatedData.mirrorMA && calculatedData.mirrorMA[i] !== null) {
                    maxVal = Math.max(maxVal, calculatedData.mirrorMA[i]);
                    minVal = Math.min(minVal, calculatedData.mirrorMA[i]);
                }
                if (calculatedData.fastMA && calculatedData.fastMA[i] !== null) {
                    maxVal = Math.max(maxVal, calculatedData.fastMA[i]);
                    minVal = Math.min(minVal, calculatedData.fastMA[i]);
                }
            }

            const yPadding = (maxVal - minVal) * 0.12;
            maxVal += yPadding;
            minVal -= yPadding;

            function getMainY(price) {
                return mainBottomY - ((price - minVal) / (maxVal - minVal)) * mainHeight;
            }
            function getSubY(value) {
                return subBottomY - (value / 100.0) * subHeight;
            }

            // ---- DRAW GRIDS ----
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);

            for (let i = 0; i < currentVisibleCount; i += 10) {
                let x = i * barSpacing + barSpacing / 2;
                ctx.beginPath();
                ctx.moveTo(x, mainTopY);
                ctx.lineTo(x, subBottomY);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // ---- DRAW PERIOD SEPARATOR ----
            const today = new Date();
            const daysIndo = ["Min", "Sen", "Sel", "Rab", "Kam", "Jum", "Sab"];

            for (let i = startIndex + 1; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const dateCurrent = parseBarDate(rawData[i].datetime);
                const datePrev = parseBarDate(rawData[i - 1].datetime);

                // Garis pembatas digambar setiap kali ada perubahan tanggal
                const isNewPeriod = (dateCurrent.getDate() !== datePrev.getDate()) || 
                                    (dateCurrent.getMonth() !== datePrev.getMonth()) || 
                                    (dateCurrent.getFullYear() !== datePrev.getFullYear());

                if (isNewPeriod) {
                    const xLine = localIdx * barSpacing;
                    const isToday = dateCurrent.getDate() === today.getDate() &&
                                    dateCurrent.getMonth() === today.getMonth() &&
                                    dateCurrent.getFullYear() === today.getFullYear();

                    if (isToday) {
                        ctx.strokeStyle = "rgba(255, 215, 0, 0.5)"; // Garis emas untuk Hari Ini
                        ctx.lineWidth = 1.5;
                    } else {
                        ctx.strokeStyle = "rgba(255, 255, 255, 0.2)"; // Garis putih transparan
                        ctx.lineWidth = 1;
                    }

                    ctx.setLineDash([3, 3]);
                    ctx.beginPath();
                    ctx.moveTo(xLine, mainTopY - 10);
                    ctx.lineTo(xLine, mainBottomY);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    ctx.fillStyle = isToday ? "#ffd700" : "rgba(255, 255, 255, 0.5)";
                    ctx.font = "bold 9px sans-serif";
                    ctx.textAlign = "center";
                    
                    let labelText = `${daysIndo[dateCurrent.getDay()]} ${dateCurrent.getDate()}/${dateCurrent.getMonth() + 1}`;
                    ctx.fillText(labelText, xLine, mainTopY - 5);

                    if (isToday) {
                        ctx.fillStyle = "#ffd700";
                        ctx.fillText("HARI INI", xLine, mainBottomY - 5);
                    }
                }
            }

            // ---- INDIKATOR 1 (Vertical Midnight Blue Box Histogram) ----
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const xStart = localIdx * barSpacing;
                const lowPrice = parseFloat(rawData[i].low);
                const yLow = getMainY(lowPrice);

                ctx.fillStyle = "#191970";
                ctx.fillRect(xStart + 1, yLow, barSpacing - 1, mainBottomY - yLow);
            }

            // ---- INDIKATOR 2 (Symmetrical MA Ribbon - Pita Pengikut Tren) ----
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;

                const fast = calculatedData.fastMA[i];
                const slow = calculatedData.slowMA[i];
                const mirror = calculatedData.mirrorMA[i];

                if (fast !== null && slow !== null && mirror !== null) {
                    const yFast = getMainY(fast);
                    const ySlow = getMainY(slow);
                    const yMirror = getMainY(mirror);

                    ctx.lineWidth = Math.max(1, barSpacing - 2);

                    if (fast > slow) {
                        ctx.strokeStyle = "rgba(30, 144, 255, 0.45)";
                        ctx.beginPath();
                        ctx.moveTo(x, ySlow);
                        ctx.lineTo(x, yFast);
                        ctx.stroke();
                    } else {
                        ctx.strokeStyle = "rgba(255, 140, 0, 0.45)";
                        ctx.beginPath();
                        ctx.moveTo(x, ySlow);
                        ctx.lineTo(x, yMirror);
                        ctx.stroke();
                    }
                }
            }

            // Garis Utama Moving Average
            ctx.lineWidth = 2;

            // Fast MA (Blue)
            ctx.strokeStyle = "#1e90ff";
            ctx.beginPath();
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const y = getMainY(calculatedData.fastMA[i]);
                if (i === startIndex) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Mirror MA (Orange)
            ctx.strokeStyle = "#ff8c00";
            ctx.beginPath();
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const y = getMainY(calculatedData.mirrorMA[i]);
                if (i === startIndex) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Base Slow MA (Gray Dotted)
            ctx.strokeStyle = "#808080";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.beginPath();
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const y = getMainY(calculatedData.slowMA[i]);
                if (i === startIndex) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);

            // ---- CANDLESTICKS ----
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const xCenter = localIdx * barSpacing + barSpacing / 2;
                const open = parseFloat(rawData[i].open);
                const close = parseFloat(rawData[i].close);
                const high = parseFloat(rawData[i].high);
                const low = parseFloat(rawData[i].low);

                const yOpen = getMainY(open);
                const yClose = getMainY(close);
                const yHigh = getMainY(high);
                const yLow = getMainY(low);

                const isBullish = close >= open;

                ctx.strokeStyle = "#00ff00";
                ctx.lineWidth = 1.2;

                ctx.beginPath();
                ctx.moveTo(xCenter, yHigh);
                ctx.lineTo(xCenter, yLow);
                ctx.stroke();

                const barWidth = Math.max(3, barSpacing * 0.7);
                if (isBullish) {
                    ctx.fillStyle = "#080826";
                    ctx.fillRect(xCenter - barWidth/2, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));
                    ctx.strokeRect(xCenter - barWidth/2, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));
                } else {
                    ctx.fillStyle = "#00ff00";
                    ctx.fillRect(xCenter - barWidth/2, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));
                    ctx.strokeRect(xCenter - barWidth/2, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));
                }
            }

            // Sumbu Label Harga Sebelah Kanan
            ctx.fillStyle = "#8888aa";
            ctx.font = "10px sans-serif";
            ctx.textAlign = "left";
            const ticks = 4;
            for (let j = 0; j <= ticks; j++) {
                let p = minVal + (maxVal - minVal) * (j / ticks);
                ctx.fillText(p.toFixed(currentSymbol === "XAU/USD" ? 2 : 5), chartWidth + 5, getMainY(p) + 3);
            }

            // ---- INDIKATOR 3 (EMA Subwindow 2-50) ----
            ctx.strokeStyle = "#333355";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, subTopY - 10);
            ctx.lineTo(width, subTopY - 10);
            ctx.stroke();

            const levels = [85, 50, 15];
            ctx.strokeStyle = "rgba(128, 128, 128, 0.5)";
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);
            levels.forEach(lvl => {
                let y = getSubY(lvl);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(chartWidth, y);
                ctx.stroke();

                ctx.fillStyle = "#8888aa";
                ctx.setLineDash([]);
                ctx.fillText(lvl.toString(), chartWidth + 5, y + 3);
                ctx.setLineDash([3, 3]);
            });
            ctx.setLineDash([]);

            // Plotting Garis EMA 1 (Biru, Cepat)
            ctx.strokeStyle = "#0000ff";
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const y = getSubY(calculatedData.emaSub1[i]);
                if (i === startIndex) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Plotting Garis EMA 2 (Merah, Lambat)
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const y = getSubY(calculatedData.emaSub2[i]);
                if (i === startIndex) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();

            // Menggambar Panah Sinyal Overbought / Oversold
            for (let i = startIndex; i <= endIndex; i++) {
                const localIdx = i - startIndex;
                const x = localIdx * barSpacing + barSpacing / 2;
                const emaVal = calculatedData.emaSub1[i];

                if (emaVal !== null) {
                    if (emaVal <= 15) {
                        const y = getSubY(emaVal) + 12;
                        ctx.fillStyle = "#00ff00";
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x - 5, y + 8);
                        ctx.lineTo(x + 5, y + 8);
                        ctx.closePath();
                        ctx.fill();
                    }

                    if (emaVal >= 85) {
                        const y = getSubY(emaVal) - 12;
                        ctx.fillStyle = "#ff0000";
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(x - 5, y - 8);
                        ctx.lineTo(x + 5, y - 8);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
            }
        }

        function getIntervalDisplayName(interval) {
            return interval === "1h" ? "H1" : "H4";
        }

        // Event Handler
        function changeTimeframe(tf, button) {
            currentInterval = tf;
            setActiveButton(button);
            updateHeaderTitle();
            fetchData();
        }

        function changeSymbol(symbol, button) {
            currentSymbol = symbol;
            setActiveButton(button);
            updateHeaderTitle();
            fetchData();
        }

        function refreshData() {
            fetchData();
        }

        function setActiveButton(clickedButton) {
            const siblings = clickedButton.parentElement.querySelectorAll(".btn");
            siblings.forEach(btn => btn.classList.remove("active"));
            clickedButton.classList.add("active");
        }

        function updateHeaderTitle() {
            document.getElementById("chart-title").innerText = `${currentSymbol} - ${getIntervalDisplayName(currentInterval)}`;
        }

        // Jalankan Pertama Kali saat Halaman Dibuka
        updateHeaderTitle();
        resizeCanvas();
        fetchData();
    </script>
</body>
</html>
